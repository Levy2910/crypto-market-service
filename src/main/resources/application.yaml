spring:
  application:
    name: crypto-market-service

  datasource:
    url: jdbc:postgresql://localhost:5432/crypto
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

    hibernate:
      ddl-auto: create

    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000