version: '3.8'

services:
  postgres:
    image: postgres:16

    container_name: crypto-postgres

    environment:
      POSTGRES_DB: crypto
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: