version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: crypto-postgres

    environment:
      POSTGRES_DB: crypto
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: crypto-redis

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data: